<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRF - Planeador de Carga</title>
    <style>
        /* DESIGN GERAL */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a3a5a; margin-bottom: 20px; }

        /* PAINEL DE ENTRADA */
        .painel-frota { background: #e3e9ef; padding: 30px; border-radius: 10px; text-align: center; border: 1px solid #cfd9e1; margin-bottom: 25px; }
        .input-placa { font-size: 24px; text-transform: uppercase; font-weight: bold; width: 120px; text-align: center; border: 2px solid #1f77b4; border-radius: 6px; padding: 5px; }
        
        /* BOTÕES */
        .btn-acao { background-color: #1f77b4; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-acao:hover { background-color: #155a8a; }
        .btn-secundario { background-color: #6c757d; margin-top: 10px; }

        /* ÁREA DE TRABALHO */
        .controles { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; background: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 10px; margin-top: 20px; }
        .input-group { display: flex; flex-direction: column; align-items: center; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        .input-group label { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 70px; padding: 8px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        
        /* CORES DAS MARCAS */
        .label-liq { color: #27ae60; }
        .label-cop { color: #1f77b4; }

        /* PRIORIDADE DE DESCARGA */
        .ordem-descarga { grid-column: 1 / -1; background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; border: 1px dashed #bbb; }
        .radio-group { display: flex; justify-content: center; gap: 30px; margin-top: 10px; font-weight: bold; }

        /* MAPA DE CARGA */
        .carroceria-wrapper { overflow-x: auto; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-top: 20px; }
        .grid-dinamico { display: grid; gap: 4px; }
        .celula { height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; border-radius: 4px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.4); }
        .bg-vazio { background-color: #e9ecef; border: 1px dashed #ced4da; color: #adb5bd; }
        
        /* CORES DAS BOTIJAS */
        .bg-P13L { background-color: #27ae60; } /* Liquigás */
        .bg-P13C { background-color: #1f77b4; } /* Copagaz */
        .bg-P45  { background-color: #d62728; }
        .bg-P20  { background-color: #ff7f0e; }
        .bg-P8   { background-color: #bcbd22; }
        .bg-P5   { background-color: #9467bd; }

        #resumo { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 18px; display: none; }

        @media print {
            .painel-frota, .controles, .btn-secundario { display: none !important; }
            body { padding: 0; }
            .container { box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚛 Planeador de Carga Profissional</h1>

    <div class="painel-frota" id="painel-frota">
        <h3>Identificar Camião</h3>
        <p>Digite a matrícula (ex: QRF):</p>
        <input type="text" id="placa_busca" class="input-placa" maxlength="3">
        <br><br>
        <button class="btn-acao" onclick="buscarCaminhao()">Aceder ao Camião</button>
        <div id="msg-erro" style="color:red; margin-top:15px; display:none;">Matrícula não encontrada.</div>
    </div>

    <div id="area-calculo" style="display: none;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2 id="titulo-ativo"></h2>
            <button class="btn-acao btn-secundario" onclick="location.reload()">Trocar Camião</button>
        </div>

        <div class="controles">
            <div class="input-group">
                <label class="label-liq">P13 Liquigás</label>
                <input type="number" id="qtd_p13_liq" value="0">
            </div>
            <div class="input-group">
                <label class="label-cop">P13 Copagaz</label>
                <input type="number" id="qtd_p13_cop" value="0">
            </div>
            <div class="input-group"><label>P45</label><input type="number" id="qtd_p45" value="0"></div>
            <div class="input-group"><label>P20</label><input type="number" id="qtd_p20" value="0"></div>
            <div class="input-group"><label>P8</label><input type="number" id="qtd_p8" value="0"></div>
            <div class="input-group"><label>P5</label><input type="number" id="qtd_p5" value="0"></div>
            
            <div class="ordem-descarga">
                <label>🏁 Qual marca sai <b>PRIMEIRO</b> do camião (Portas)?</label>
                <div class="radio-group">
                    <label class="label-liq"><input type="radio" name="prio" value="L" checked> Liquigás</label>
                    <label class="label-cop"><input type="radio" name="prio" value="C"> Copagaz</label>
                </div>
            </div>

            <div style="grid-column: 1 / -1; display: flex; gap: 10px;">
                <button class="btn-acao" style="flex:2" onclick="gerarMapa()">CALCULAR E GERAR MAPA</button>
                <button class="btn-acao btn-secundario" style="flex:1" onclick="window.print()">🖨️ PDF / Imprimir</button>
            </div>
        </div>

        <div id="resumo"></div>

        <div class="secao">
            <h3>🗺️ Mapa de Arrumação (Vista Superior)</h3>
            <div class="carroceria-wrapper">
                <div id="grid_mapa" class="grid-dinamico"></div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
